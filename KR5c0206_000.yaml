front:
  text: 太上三五傍救醮五帝斷殟儀則四
  hash: sha256:70fee7a9decdbaf4d00d21e4d75ab76b381c611f83b40712dd46b94f45f05009
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0206_HFL_000-001a, image: hfl/0566/0566-092.png}
body:
  text: 夫人家忽逢天災厄難家口癭疔經一日五日者此是宅舍前後五帝神祗不衛於人及有四方鄰里忽被染剔皆是天行疫鬼雲中李子遨張元伯劉元逹烏丸鬼等病患人家但是人家若患天行時疫三年內皆再發一度可於醮曆檢定良日求一道士延請就宅若辦得修神呪齊一日兩夜三日三夜若不辦只請一人醮五帝所須色目具列如後真乳頭香一兩半六爐案六面筆五管墨五錠五方綵各一段隨方色手巾五條各長四尺二寸命祿米五盤每盤一斗二升酒一斗盞子四十𨾏信錢五分每分一百二十文𥿄一束五帖作錢財五帖鎮座醮盤四十分餅䭃胡桃乾棗乾魚鹿脯時新果子茅香湯一碗燈十二盞桃牌六枚各長一尺一寸闊二寸師位居北叩齒三十六通了入壇解穢次禁鬼門次衛靈呪次發爐弟子裝束冠帶如法於齊壇前䖍誠告祝設拜捻香以俟通感維某年某月某朔某日洞淵弟子臣某等謹為弟子某甲上啓上請東方青帝靈威仰勾芒君青帝夫人降下上請南方赤帝熛弩祝融君赤帝夫人降下上請西方白帝招矩少昊君白帝夫人降下上請北方黑帝叶光紀玄冥君黑帝夫人降下上請中央黃帝含樞紐軒轅君黃帝夫人降下上請五帝之子五帝之孫典籍功曹司命司録好生司馬大神解穢主者左右尚書前後僕射延夀玊女長吏司空注年博士上下大夫虛無小吏削死定生君解衰脫厄君保命益算君治病下藥君浮雲使者君雷師電師君四州九谷君河上仙官江湖玊女君吞魔食鬼君收殟食鬼君斬鬼破鬼君掃蕩不祥安隱六腑君移名定籍君各各諸座歆饗微禮符告上下關啓天地大神五帝仙官并及此間土地真官九江水帝十二溪女河伯水官地下七神土地之主五嶽四瀆護人長吏加算主者左右傳吏解罪之君一切神靈各各執持玊板聽臣口中詞語今有弟子某家纍年巳來居止不利人口癭疔死亡非一經營不遂官職不遷所願不從災厄妄生卜決憂忌皆見八方四面並有下官故氣疫癘鬼兵八部魔邪暴害良善門門唯聞哭尸之響不聞雅樂之音大小哀哉枉遭者衆耳聞目見非是吉祥某等日夜驚惶無方投趣伏聞老君設教授與仙真下傳凡俗大解妙法殺鬼生人今於當處結壇奉獻酒脯祠五帝之具占得九章今日吉良宿得天倉明如日月比於三光百味雜饌不敢先嘗清酒淨脯甘美甚香帝君受饗賜福無量七祖生天解釋禍殃逍遙雅樂位等仙王生人富貴子孫滿堂三十六代及以先亡升入南宫長樂福鄉去離三塗免墮鑊湯長辭劔樹寒冰鐵床不見銅柱牛頭阿傍瘟疫疾病萬代消亡收攝百鬼施於太陽災害解散永保吉昌五帝之主萬神之王消滅惡業知其柔剛暉生枯榮言成雪霜能使官災消散疾病去床能使春秋冬夏上下玄黃能使四時節氣天圓地方動作自然五色玄黃三明六律七柔八剛造作人形無暗不照無明不光北斗七星布置諸宿角亢氐房心尾箕配屬東方井鬼栁星張翼軫配屬南方奎婁胃昴畢觜參配屬西方斗牛女虛危室璧配屬北方魁𩲃𩵄䰢魓𩳐魒配屬中央五行推節寒熱溫涼使金剋木木自折傷使木剋土土自潜藏使土剋水水不流行使水剋火火自無光使火剋金金自消亡打考戮鬼鬼走逺方療治疾病立即自康規覓求官冝奉公王使神安宅宅如金剛使符指鬼鬼即滅亡使神斬邪邪自破傷使神治病病人去床使神防衛行者吉昌使神安墓子孫滿堂使神耕種五榖滿倉使神斷病來者不當天有九章人有惡業棄與八荒蕩除街巷村陌并及弟子某宅內瘟疫斑黃自家親之外速去逺方屯營百鬼之帥捉搦付與鑊湯吞噉精魅五體消亡老君口勑誅斬不祥何神能住何鬼敢當帝君降下萬歲吉昌行來出入五神扶匡官災解散鬼賊潜藏弟子再拜次上香上茶上酒謹啓五帝君等若有邪精五殟鬼氣或復藏形隱影變化百端盤停不去者上請五噉大將軍降下放大威力口吐神火燒鬼頭破然鬼身形滅其根種急急一如女青詔書律令某七代已來逮及今身所造故違無數重罪賜乞原除某上祖父母生存所犯東方十惡五逆之罪不蒙解釋者上請角亢氐房心尾箕甲乙寅卯辰君主為某甲解釋悉令原除某生存所犯南方十惡五逆重罪不蒙解釋者上請井鬼栁星張翼軫已午未丙丁君主為某甲解釋悉令原除某生存所犯西方十惡五逆重罪不蒙解解釋者上請奎婁胃昴畢觜參申酉戌庚辛君主為某甲解釋悉令原赦某生存所犯北方十惡五逆重罪不蒙解釋者上請斗牛女虛危室璧亥子丑壬癸君主為某甲解釋悉令原除某生存所犯中央十惡五逆重罪不蒙解釋者上請中斗七星魁𩲃𩵄䰢魓𩳐魒主為弟子某甲解釋悉令原赦若春之三月有青殟青疫行病之鬼因木王相欲行毒藥傷害良善者上請西方白帝君主為弟子斬殺之不得妄行毒害若夏之三月有赤殟赤疫行病之鬼因火王相欲行毒藥傷害良善者上請北方黑帝君斬殺之不得妄行毒害若秋之三月有白殟白疫行病之鬼因金王相欲行毒藥傷害良善者上請南方赤帝君斬殺之不得妄行毒害若冬之三月有黑殟黑疫行病之鬼因水王相欲行毒藥傷害良善者上請中央黃帝君斬殺之不得妄行毒害若四季之月有黃殟黃疫行病之鬼因土王相欲行毒藥傷害良善者上請東方青帝君斬殺之不得妄行忤犯斷除一切群邪悉令伏匿方得天下太平鬼神不起風調雨順萬民安樂仰被重恩弟子再拜次上香上酒上啓五帝君等第子叩頭稽顙賜乞一生一活一度一脫所有深重災厄至于某甲邊願為度災安魂定魄防衛性命救治疾病唯願肉人闔家大小等身或受年窮算盡之厄橫因上計願為解除轉更注年延生保命若有天羅地網纏繞軀體未蒙解脫各請帝君速為斬截一切邪精願令消滅若有百鬼妄生拘録肉人家口男女魂神不安者重請五方斗中延命君安生君去死君來生君迎魂附魄悉為扶拔魂神將附身體之中調和六府東斗請為延算西斗請為記名北斗請為落死南斗請為上生主為安魂司命更賜益算延夀星官請為消除死簿定上生名若有天上地下凶逆之鬼滯在某家村中巷陌門前戶後窺求血食欲行凶傷上請三五大將軍官吏將十萬人收魔食鬼唯願降下上請三五收殟食殟大將軍官將十萬人降下上請三五收疫大將軍官將十萬人具官降下上請三五收注大將軍官將十萬人具官降下上請收精食精大將軍宫將十萬人具官降下上請收邪食邪大將軍官將十萬人具官降下上請收毒食毒大將軍官將十萬人具官降下上請收魅食魅大將軍官將十萬人具官降下上請收凶食凶大將軍官將十萬人具官降下上請五方五帝斬鬼大將軍官將十萬人降下主為某甲家同心併力收攝村中巷陌家中宅內行客魍魎之鬼伏尸刑殺之鬼次收門戶井竈之鬼次收五虛六耗凶吹惡逆之鬼次收童男童女之鬼次收殃𦍙土長之鬼次收獨歌自舞喜笑之鬼次收蠱毒野道之鬼次收山精崖石百魅之鬼次收八部行病之鬼次收喚人魂魄之鬼次收各有名字之鬼次收明公石矴之鬼次收無名脫籍之鬼次收樹下犬子之鬼次收夜行凶逆之鬼次收山林社稷惡逆淫祠之鬼次收天下四鎮死將之鬼次收刀兵軍陳無頭無手之鬼次收吳王子胥之鬼次收赤眉盜賊之鬼次收三王五霸敗軍死將之鬼次收下痢䐜腫之鬼次收魯丁斑黃轉筋謦咳吐逆之鬼次收雲中李子遨千精萬魅之鬼次收搖鈴吹角呼喚之鬼次收縊死之鬼次收落水之鬼次收羌獠之鬼次收六夷之鬼次收胡狄蠻戎之鬼次收東方青注之鬼次收南方赤注之鬼次收西方白注之鬼次收北方黑注之鬼次收中央黃注之鬼次收絶戶之鬼次收異病卒死之鬼次收白秃癩病之鬼次收瘡膿臭穢之鬼次收市死斬頭絞刑之鬼次收烏鵲亂鳴惡音之鬼次收飢寒凍死之鬼次收藏形隱影之鬼次收口舌妄語之鬼次收六畜之鬼次收厭人魂魄之鬼次收白骨不葬之鬼次收新死破射取人之鬼次收鼠頭人身之鬼次收牛頭人身之鬼次收虎頭人身之鬼次收兔頭人身之鬼次收龍頭人身之鬼次收蛇頭人身之鬼次收馬頭人身之鬼次收羊頭人身之鬼次收猴頭人身之鬼次收狗頭人身之鬼次收猪頭人身之鬼右此鬼不承大道盟威禁律之命專在人間行其惡毒令人遭官遇禍疾病死亡非所道理非五帝之君天官一一仰憑次收討反縳逆鬼付與都市一切絞刑滅其根種願令天下清寧萬民安樂五榖滋盛闔家大小魂魄或閉在天地水三官百鬼牢獄之中不蒙解脫者或為百鬼縶繫者請五方五帝七星之君夀命君延命君解厄治病君却死來生君保命衛護君主為某甲安魂定魄司命延年益算七星消除死籍東方青色衰厄從今消滅青殟鬼氣應時斷絶南方赤色衰厄從今消滅亦殟鬼氣應時斷絶西方白色衰厄從今消滅白殟鬼氣應時斷絶北方黑色衰厄從今消滅黑殟鬼氣應時斷絶中央黃色衰厄從今消滅黃殟鬼氣應時斷絶今日值建所請依願福慶巍巍更無所恨今日值除請福之後災禍消除鬼賊殄滅福慶有餘今日值滿與帝為伴任意從容萬事欣喜今日值平福有餘慶神來降駕所願皆成今日值定天地同慶神靈飽滿合家無病今日值執百福臻集富貴欣歡無有猒忌今日值破却除罪過神來降福消災却禍靈祇降駕福祿更多今日值危永保無為祈恩巳後所願皆遂今日值成男女長生錢財聚集五穀豐盈今日值收戶戶無憂黃金入宅代代不休今日值開仙官並來真氣覆䕃不見禍災今日值閉百鬼消滅住宅清寧鬼神伏歇次上酒行香重啓五帝七星君等臣所請仙官及同侍從當預坐者普願歆饗降福重於太山消災迅如電散福逐神來天神降重應感斯須拜謝既周行觴已畢詞不再陳言無所重龍車整轡神馬急備來如雲奔去如風雨迎神千里送神不起自東自西各還宫府後有祈請别賜垂臨臣及弟子誠惶誠恐稽首再禮奉辭次送神讃次十二願次學仙讃散如常儀太上三五傍救醮五帝斷殟儀
